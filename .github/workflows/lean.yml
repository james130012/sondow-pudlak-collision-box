name: Lean

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build-args: >-
            EulerLimit.StrengthenedConsistency
            EulerLimit.ProjectionBridge
            integration.SondowProjectPudlakInstantiation
