name = "euler_limit"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["EulerLimit"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "bounded_arithmetic_lab"
path = "bounded_arithmetic_lab"

[[require]]
name = "Foundation"
git = "https://github.com/FormalizedFormalLogic/Foundation.git"
rev = "b62b3bac1bbd44ca8a7f7159340a0b0193d12b3e"

[[lean_lib]]
name = "EulerLimit"

[[lean_lib]]
name = "integration"
