name = "euler_limit"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["EulerLimit"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "bounded_arithmetic_lab"
path = "bounded_arithmetic_lab"

[[lean_lib]]
name = "EulerLimit"

[[lean_lib]]
name = "integration"
